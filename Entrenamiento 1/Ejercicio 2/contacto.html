<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="contacto.css">
    <title>Document</title>
</head>
<main>
    <header>
        <h1> <a href="index.html">HOME</a> | <a href="contacto.html">CONTACTO</a></h1>
    </header>
    <main>
        <section class="section_receta">
            <form>
                <div class="form">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" required><br><br>
                </div>
                <div class="form">
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" required><br><br>
                </div>
                <div class="form">
                    <label for"telefono">Telefono:</label>
                    <input type="tel" id="telefono" name="telefono" required><br>
                </div>
                <div class="form">
                <label for="mensaje">Mensaje:</label>
                <textarea id="mensaje" name="mensaje" rows="7" cols="80" required></textarea><br><br>
                </div>
                <input class="button" id="botonEnviar" type="submit" value="Enviar">
                <input class="button" id="botonCancelar" type="button" value="Cancelar">
            </form>
        </section>
    </main>
    <footer>
        <h2>
            <p>Todos los derechos reservados</p>
        </h2>
    </footer>
</body>
</html>
